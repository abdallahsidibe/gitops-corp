apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
labels:
  - pairs:
      environment: staging
      app.kubernetes.io/instance: todo-api
    includeSelectors: true
    includeTemplates: true
patches:
  - path: patch-replicas.yaml
    target:
      kind: Deployment
      name: todo-api
